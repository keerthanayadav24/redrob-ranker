# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
 CandidateIQ is an AI-powered recruitment platform that performs semantic
  candidate retrieval using Sentence Transformers and cosine similarity.
  Retrieved candidates are evaluated using a hybrid weighted scoring engine
  that considers semantic relevance, skills, experience, location, notice
  period, and profile quality. Honeypot detection penalizes suspicious or
  inconsistent profiles before generating an explainable Top 100 candidate
  ranking. The solution is deployed using a React frontend, FastAPI backend,
  Netlify, and Render while meeting CPU-only runtime constraints.

